# Example bofa configuration file.
# Copy this file to bofa.toml and fill in your credentials.
# Secrets are referenced as environment variable names prefixed with '$'.

[repository]
owner = "your-owner"
repo = "your-repo"

[worker]
provider = "github"
# When dry_run is true, non-fetch actions such as upload, delete, and publish
# are blocked. Fetch actions like check pr continue to work.
dry_run = false

[credentials]
type = "app"
app_id = "$APP_ID"
# Valid key_type values: "PEM" or "DER".
key_type = "PEM"
key = "$APP_KEY"
installation_id = "$INSTALLATION_ID"

# [credentials]
# type = "app"
# app_id = "$APP_ID"
# key_type = "DER"
# key = "$APP_KEY"
# installation_id = "$INSTALLATION_ID"

# [credentials]
# type = "account"
# username = "$BOFA_USERNAME"
# password = "$BOFA_PASSWORD"

# [credentials]
# type = "user_access_token"
# token = "$BOFA_USER_ACCESS_TOKEN"

# [credentials]
# type = "personal_token"
# token = "$BOFA_PERSONAL_TOKEN"

[scanner.sensitive]
enabled = true

[[scanner.sensitive.item]]
description = "Example sensitive path group"
paths = ["/path/to/repo1", "/path/to/repo2"]
members = ["alice", "bob"]

# Logging options.
# Logs are written to stderr. Set enabled = false to turn logging off entirely.
# level is a tracing directive string. Set the global level and per-module levels
# with a comma-separated list, e.g. "warn,bofa_lib=trace".
# format controls the output layout: "full", "compact", "pretty", or "json".
# When RUST_LOG is set, it overrides the configured level.
[log]
enabled = true
level = "warn,bofa_lib=trace"
format = "full"
