# Example bofa configuration file.
# Copy this file to bofa.toml and fill in your credentials.
# Secrets are referenced as environment variable names prefixed with '$'.

[repository]
owner = "your-owner"
repo = "your-repo"

[worker]
provider = "github"
# When dry_run is true, non-fetch actions such as upload, delete, publish,
# post_comment, and add_labels are blocked. Fetch actions continue to work.
dry_run = false
# When post_comments is true, the rendered check_pr report is posted as a
# comment on the target pull request and configured scanner labels are applied.
# When false, nothing is posted or applied, but configured labels are still
# checked for existence and missing ones are reported. Defaults to true.
post_comments = true

[credentials]
type = "app"
app_id = "$APP_ID"
# Valid key_type values: "PEM" or "DER".
key_type = "PEM"
key = "$APP_KEY"
installation_id = "$INSTALLATION_ID"

# [credentials]
# type = "app"
# app_id = "$APP_ID"
# key_type = "DER"
# key = "$APP_KEY"
# installation_id = "$INSTALLATION_ID"

# [credentials]
# type = "account"
# username = "$BOFA_USERNAME"
# password = "$BOFA_PASSWORD"

# [credentials]
# type = "user_access_token"
# token = "$BOFA_USER_ACCESS_TOKEN"

# [credentials]
# type = "personal_token"
# token = "$BOFA_PERSONAL_TOKEN"

[scanner]
# When enabled is false, the entire scanner step is skipped during check pr.
# Defaults to true.
enabled = true

[scanner.sensitive]
enabled = true
# Labels applied to the pull request whenever any sensitive finding matches.
# Labels that do not exist in the repository are skipped with a warning.
# labels = ["needs-security-review"]
# When always_report is true, a report is rendered even if no sensitive files
# are found. Defaults to false.
# always_report = false

[scanner.sensitive.groups.example]
description = "Example sensitive path group"
paths = ["/path/to/repo1", "/path/to/repo2"]
members = ["alice", "bob"]
# Labels applied to the pull request when this group matches.
# labels = ["core-impact", "high-priority"]

[scanner.triage]
# When enabled is true, bofa triage pr scans changed files and applies the
# configured labels for every matching group. Defaults to false.
enabled = true
# When post_comment is true, a triage summary comment is posted on the pull
# request. Labels are applied regardless of this setting. Defaults to false.
post_comment = false

[scanner.triage.groups.example]
description = "Example triage group"
paths = ["src/**", "tests/**"]
# Labels are required for triage groups and are applied when the group matches.
labels = ["needs-review", "triage-example"]

# Template overrides.
# The report template is rendered when the sensitive scanner finds matching files
# in a pull request. It receives a `findings` list; each finding has `name`,
# `description`, `matched_paths`, and `related_persons`. If omitted, the default
# template is used.
#
# The empty_report template is rendered when the sensitive scanner is enabled but
# finds no matching files and [scanner.sensitive].always_report is true. If
# omitted, the default template "No sensitive files found." is used.
[template.scanner.sensitive]
# report = """
# Scanner found {{ findings | length }} sensitive groups being changed:
# {% for finding in findings -%}
# - {{ finding.name }}: {{ finding.description }}
#   Affected files:
# {% for path in finding.matched_paths %}  - `{{ path }}`
# {% endfor %}
#   cc {% for person in finding.related_persons %}@{{ person }}{% if not loop.last %} {% endif %}{% endfor %}
# {% endfor -%}
# """
# empty_report = "No sensitive files found."

# The footnote template is appended to every comment bofa posts. It receives an
# `app_name` variable holding the authenticated account login (for GitHub Apps
# this is the bot login, e.g. "my-app[bot]"; empty when it could not be
# resolved). Set footnote = "" to disable the footnote entirely.
# If omitted, the default footnote is used.
[template.comment]
# footnote = ""

# Logging options.
# Logs are written to stderr. Set enabled = false to turn logging off entirely.
# level is a tracing directive string. Set the global level and per-module levels
# with a comma-separated list, e.g. "warn,bofa_lib=trace".
# format controls the output layout: "full", "compact", "pretty", or "json".
# When RUST_LOG is set, it overrides the configured level.
[log]
enabled = true
level = "warn,bofa_lib=trace"
format = "full"
