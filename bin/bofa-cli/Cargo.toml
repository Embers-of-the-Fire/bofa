[package]
name = "bofa-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI bot that scans GitHub PRs for sensitive file changes and posts templated review comments"
readme = "README.md"
keywords = ["github", "pr-scanner", "code-review", "bot", "ci"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
bofa-lib.workspace = true
clap.workspace = true
dotenvy.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }

[dev-dependencies]
snapbox.workspace = true

[[bin]]
name = "bofa"
path = "src/main.rs"
