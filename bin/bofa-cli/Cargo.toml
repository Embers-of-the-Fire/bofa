[package]
name = "bofa-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { workspace = true }
bofa-lib = { path = "../../lib" }
dotenvy = "0.15"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
snapbox = { workspace = true }

[[bin]]
name = "bofa"
path = "src/main.rs"
